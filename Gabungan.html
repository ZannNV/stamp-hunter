<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praktikum Menggambar Teknik</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0a0e1a;
            color: #e2e8f0;
            overflow: hidden;
        }

        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        #welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #111827, #0a0e1a);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        #welcome-screen h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            background: -webkit-linear-gradient(#00c2ff, #667eea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            padding: 0 20px;
        }

        .start-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
        }

        #app-area {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        .tab-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111827;
            padding: 0 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 10;
            height: 60px;
            box-sizing: border-box;
        }

        .nav-left, .nav-right {
            display: flex;
            align-items: center;
            flex: 1;
        }

        .nav-center {
            display: flex;
            justify-content: center;
            flex: 2;
            height: 100%;
            align-items: flex-end;
        }

        .nav-right {
            justify-content: flex-end;
        }

        .home-btn {
            color: #64748b; 
            font-size: 1.2rem; 
            padding: 5px 10px;
            border-bottom: none !important;
        }
        .home-btn:hover {
            color: #e2e8f0;
        }

        .tab {
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #64748b;
            background: transparent;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
        }

        .tab:hover {
            color: #e2e8f0;
        }

        .tab.active {
            color: #00c2ff;
            border-bottom: 3px solid #00c2ff;
        }

        .iframe-container {
            flex: 1;
            position: relative;
            background-color: #fff;
            overflow: hidden; /* Hide sliding overflow */
        }

        .app-iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: none;
            transition: transform 0.6s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.6s ease;
        }

        .app-iframe.active {
            display: block;
            transform: translateX(0);
            opacity: 1;
        }
        
        /* Slide Animations */
        .app-iframe.slide-left-enter {
            display: block;
            transform: translateX(50px);
            opacity: 0;
        }
        .app-iframe.slide-left-leave {
            transform: translateX(-50px);
            opacity: 0;
        }
        .app-iframe.slide-right-enter {
            display: block;
            transform: translateX(-50px);
            opacity: 0;
        }
        .app-iframe.slide-right-leave {
            transform: translateX(50px);
            opacity: 0;
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div id="welcome-screen">
        <h1>Welcome to Praktikum Menggambar Teknik</h1>
        <p style="color: #64748b; margin-bottom: 40px; font-size: 1.1rem;">Tekan tombol di bawah untuk memulai</p>
        <button class="start-btn" onclick="startApp()">Start</button>
    </div>

    <div id="app-area">
        <div class="tab-container" id="tab-container">
            <div class="nav-left">
                <img src="Logo Impranet.svg" alt="Logo" style="height: 35px; margin-right: 15px;">
                <button class="tab home-btn" onclick="goHome()" title="Home">🏠</button>
            </div>
            <div class="nav-center">
                <button class="tab active" data-index="0" onclick="switchTab('dice')">Colour Dice</button>
                <button class="tab" data-index="1" onclick="switchTab('stamp')">Cek Stamp dan Absensi</button>
                <button class="tab" data-index="2" onclick="switchTab('timer')">Timer</button>
            </div>
            <div class="nav-right">
            </div>
        </div>
        <div class="iframe-container">
            <iframe id="iframe-dice" class="app-iframe active" srcdoc="&lt;!DOCTYPE html&gt;
&lt;html lang=&quot;id&quot;&gt;

&lt;head&gt;
    &lt;meta charset=&quot;UTF-8&quot;&gt;
    &lt;meta name=&quot;viewport&quot; content=&quot;width=device-width, initial-scale=1.0&quot;&gt;
    &lt;title&gt;Colour Dice - Praktikum Menggambar Teknik&lt;/title&gt;
    &lt;style&gt;
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: &#x27;Segoe UI&#x27;, Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 1100px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #2d3748;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        h2 {
            color: #667eea;
            font-size: 1.8em;
            margin-bottom: 30px;
            font-weight: 600;
        }

        /* Halaman Utama */
        #mainPage {
            display: block;
        }

        #questionPage {
            display: none;
        }

        .status-bar {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            padding: 20px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 15px;
        }

        .status-item {
            text-align: center;
        }

        .status-item .label {
            font-size: 0.9em;
            color: #718096;
            margin-bottom: 5px;
        }

        .status-item .value {
            font-size: 1.8em;
            font-weight: bold;
            color: #667eea;
        }

        .dice-wrapper {
            margin: 40px 0;
            display: flex;
            justify-content: center;
        }

        .dice {
            width: 210px;
            height: 210px;
            border-radius: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 7em;
            font-weight: bold;
            color: white;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .dice.red {
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
        }

        .dice.blue {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
        }

        .dice.rolling {
            animation: roll 0.5s ease-in-out;
        }

        @keyframes roll {
            0% {
                transform: rotate(0deg) scale(1);
            }

            25% {
                transform: rotate(180deg) scale(0.8);
            }

            50% {
                transform: rotate(360deg) scale(1.2);
            }

            75% {
                transform: rotate(540deg) scale(0.9);
            }

            100% {
                transform: rotate(720deg) scale(1);
            }
        }

        .dice::before {
            content: &#x27;&#x27;;
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.3) 0%, transparent 70%);
            animation: shine 3s infinite;
        }

        @keyframes shine {

            0%,
            100% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0;
            }

            50% {
                transform: translate(0%, 0%) scale(1);
                opacity: 1;
            }
        }

        .button-group {
            display: flex;
            flex-direction: row;
            gap: 15px;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin: 20px 0;
            width: 100%;
        }

        .roll-button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 1.3em;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .roll-button:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
        }

        .roll-button:active {
            transform: translateY(-1px);
        }

        .roll-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .roll-button.open {
            background: linear-gradient(135deg, #f093fb, #f5576c);
        }

        .roll-button.reset {
            background: linear-gradient(135deg, #fc6c85, #f5576c);
            padding: 12px 30px;
            font-size: 1em;
        }

        /* Halaman Soal */
        #mainPage,
        #questionPage {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .question-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin: 30px 0;
            text-align: left;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 3px solid #667eea;
        }

        .question-number {
            font-size: 1.6em;
            font-weight: bold;
            color: white;
            width: 80px;
            height: 80px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: background 0.5s ease;
            line-height: 1.1;
        }

        .question-number .timer-seconds {
            font-size: 1.8em;
            font-weight: bold;
            line-height: 1;
        }

        .question-number .timer-label {
            font-size: 0.55em;
            font-weight: normal;
            opacity: 0.85;
            letter-spacing: 1px;
        }

        .question-number.warning {
            background: linear-gradient(135deg, #f6d365, #fda085) !important;
            animation: pulse-warning 0.8s infinite;
        }

        .question-number.danger {
            background: linear-gradient(135deg, #eb3349, #f45c43) !important;
            animation: pulse-danger 0.4s infinite;
        }

        @keyframes pulse-warning {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        @keyframes pulse-danger {

            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 5px 15px rgba(235, 51, 73, 0.4);
            }

            50% {
                transform: scale(1.08);
                box-shadow: 0 8px 25px rgba(235, 51, 73, 0.7);
            }
        }

        .question-content {
            font-size: 1.4em;
            line-height: 1.8;
            color: #2d3748;
            margin: 20px 0;
            padding: 25px;
            background: #f7fafc;
            border-radius: 15px;
            border-left: 5px solid #667eea;
        }

        .question-image {
            margin: 25px 0;
            text-align: center;
        }

        .question-image img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            border: 3px solid #ff6b6b;
        }

        .image-caption {
            margin-top: 10px;
            font-size: 0.9em;
            color: #718096;
            font-style: italic;
        }

        .answer-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 30px 0;
        }

        .answer-btn {
            padding: 20px 60px;
            font-size: 1.4em;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            color: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .answer-btn.correct {
            background: linear-gradient(135deg, #11998e, #38ef7d);
        }

        .answer-btn.wrong {
            background: linear-gradient(135deg, #eb3349, #f45c43);
        }

        .answer-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
        }

        .answer-btn:active {
            transform: translateY(-1px);
        }

        /* Modal Pop-up */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 50px;
            border-radius: 30px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: modalPop 0.3s ease-out;
        }

        @keyframes modalPop {
            0% {
                transform: scale(0.7);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-icon {
            font-size: 5em;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .modal-content.correct .modal-title {
            color: #11998e;
        }

        .modal-content.wrong .modal-title {
            color: #eb3349;
        }

        .modal-text {
            font-size: 1.2em;
            color: #718096;
            margin-bottom: 30px;
        }

        .modal-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
        }

        .modal-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
        }

        .info {
            margin-top: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            border-radius: 15px;
            color: white;
        }

        .info h3 {
            margin-bottom: 10px;
            font-size: 1.3em;
        }

        .info p {
            line-height: 1.6;
        }

        .used-numbers {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: space-between;
            width: 100%;
            margin: 10px 0;
            padding: 5px 20px;
            box-sizing: border-box;
        }

        .used-number {
            width: 65px;
            height: 65px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8em;
            font-weight: bold;
            color: white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        .used-number.red {
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
        }

        .used-number.blue {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
        }

        .used-number::after {
            content: attr(data-mark);
            position: absolute;
            top: -5px;
            right: -5px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75em;
            font-weight: bold;
        }

        .used-number[data-result=&quot;correct&quot;]::after {
            content: &#x27;✓&#x27;;
            background: #11998e;
        }

        .used-number[data-result=&quot;wrong&quot;]::after {
            content: &#x27;✗&#x27;;
            background: #eb3349;
        }

        .key-hint {
            display: inline-block;
            background: rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 6px;
            padding: 1px 7px;
            font-size: 0.65em;
            font-weight: normal;
            letter-spacing: 0;
            vertical-align: middle;
            margin-left: 6px;
        }

        .game-layout {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
            width: 100%;
        }

        .panel-dice {
            flex: 1;
            display: flex;
            justify-content: flex-end;
            padding-right: 20px;
        }

        .panel-history {
            flex: 0 0 250px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .panel-controls {
            flex: 1;
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            justify-content: flex-start;
            padding-top: 20px;
            padding-left: 20px;
        }

        @media (max-width: 800px) {
            .game-layout {
                flex-direction: column;
                gap: 20px;
            }

            .right-panel {
                align-items: center;
            }

            .button-group {
                justify-content: center;
            }

            .used-numbers {
                justify-content: center;
            }

            #usedNumbersSection {
                text-align: center;
            }
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8em;
            }

            h2 {
                font-size: 1.3em;
            }

            .dice {
                width: 140px;
                height: 140px;
                font-size: 4.5em;
            }

            .roll-button {
                padding: 15px 35px;
                font-size: 1.1em;
            }

            .question-card {
                padding: 25px;
            }

            .answer-btn {
                padding: 15px 40px;
                font-size: 1.2em;
            }

            .modal-content {
                padding: 35px;
            }

            .button-group {
                flex-direction: column;
            }

            .question-image img {
                max-height: 250px;
            }
        }
    &lt;/style&gt;
&lt;/head&gt;

&lt;body&gt;
    &lt;div class=&quot;container&quot;&gt;
        &lt;div id=&quot;mainPage&quot;&gt;
            &lt;h1&gt;Praktikum Menggambar Teknik&lt;/h1&gt;
            &lt;h2&gt;🎲 Colour Dice 🎲&lt;/h2&gt;

            &lt;div class=&quot;status-bar&quot;&gt;
                &lt;div class=&quot;status-item&quot;&gt;
                    &lt;div class=&quot;label&quot;&gt;Soal Terjawab&lt;/div&gt;
                    &lt;div class=&quot;value&quot; id=&quot;answeredCount&quot;&gt;0/6&lt;/div&gt;
                &lt;/div&gt;
                &lt;div class=&quot;status-item&quot;&gt;
                    &lt;div class=&quot;label&quot;&gt;Angka Sekarang&lt;/div&gt;
                    &lt;div class=&quot;value&quot; id=&quot;currentNumber&quot;&gt;-&lt;/div&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;div class=&quot;game-layout&quot;&gt;
                &lt;div class=&quot;panel-dice&quot;&gt;
                    &lt;div class=&quot;dice-wrapper&quot;&gt;
                        &lt;div id=&quot;mainDice&quot; class=&quot;dice red&quot;&gt;?&lt;/div&gt;
                    &lt;/div&gt;
                &lt;/div&gt;

                &lt;div class=&quot;panel-history&quot;&gt;
                    &lt;div id=&quot;usedNumbersSection&quot; style=&quot;visibility: hidden; width: 100%; text-align: center;&quot;&gt;
                        &lt;h3 style=&quot;color: #2d3748; margin: 10px 0;&quot;&gt;Angka yang Sudah Keluar:&lt;/h3&gt;
                        &lt;div class=&quot;used-numbers&quot; id=&quot;usedNumbers&quot;&gt;&lt;/div&gt;
                    &lt;/div&gt;
                &lt;/div&gt;

                &lt;div class=&quot;panel-controls&quot;&gt;
                    &lt;div class=&quot;button-group&quot;&gt;
                        &lt;button class=&quot;roll-button&quot; onclick=&quot;rollDice()&quot; id=&quot;rollBtn&quot;&gt;
                            🎲 Kocok Dadu 🎲
                        &lt;/button&gt;
                        &lt;button class=&quot;roll-button open&quot; onclick=&quot;openQuestion()&quot; id=&quot;openBtn&quot; style=&quot;display:none;&quot;&gt;
                            📖 Buka Soal 📖
                        &lt;/button&gt;
                    &lt;/div&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;div class=&quot;info&quot;&gt;
                &lt;h3&gt;📋 Cara Bermain&lt;/h3&gt;
                &lt;p&gt;
                    1. Klik &lt;strong&gt;&quot;Kocok Dadu&quot;&lt;/strong&gt; untuk mendapatkan angka random (1-6)&lt;br&gt;
                    2. Klik &lt;strong&gt;&quot;Buka Soal&quot;&lt;/strong&gt; untuk melihat pertanyaan&lt;br&gt;

                    const finalValue = availableNumbers[Math.floor(Math.random() * availableNumbers.length)];
                    updateDiceDisplay(dice, finalValue);
                    currentNumber = finalValue;

                    setTimeout(() =&gt; {
                        dice.classList.remove(&#x27;rolling&#x27;);
                        rollBtn.disabled = false;
                        openBtn.style.display = &#x27;inline-block&#x27;;
                        updateStatus();
                    }, 100);
                }
            }, 100);
        }

        function updateDiceDisplay(dice, value) {
            dice.textContent = value;
            if (value % 2 === 1) {
                dice.classList.remove(&#x27;blue&#x27;);
                dice.classList.add(&#x27;red&#x27;);
            } else {
                dice.classList.remove(&#x27;red&#x27;);
                dice.classList.add(&#x27;blue&#x27;);
            }
        }

        function openQuestion() {
            if (!currentNumber) return;

            const question = questions.find(q =&gt; q.no === currentNumber);

            document.getElementById(&#x27;mainPage&#x27;).style.display = &#x27;none&#x27;;
            document.getElementById(&#x27;questionPage&#x27;).style.display = &#x27;block&#x27;;

            document.getElementById(&#x27;currentQuestionNum&#x27;).textContent = currentNumber;
            document.getElementById(&#x27;questionText&#x27;).textContent = question.soal;

            // Tampilkan gambar jika ada (hanya untuk nomor merah: 1, 3, 5)
            const imageContainer = document.getElementById(&#x27;questionImageContainer&#x27;);
            const questionImage = document.getElementById(&#x27;questionImage&#x27;);
            const imageCaption = document.getElementById(&#x27;imageCaption&#x27;);

            if (question.image &amp;&amp; currentNumber % 2 === 1) {
                imageContainer.style.display = &#x27;block&#x27;;
                questionImage.src = question.image;
                imageCaption.textContent = question.imageCaption || &#x27;&#x27;;
            } else {
                imageContainer.style.display = &#x27;none&#x27;;
            }

            const numBox = document.getElementById(&#x27;questionNumberBox&#x27;);
            if (currentNumber % 2 === 1) {
                numBox.style.background = &#x27;linear-gradient(135deg, #ff6b6b, #ee5a6f)&#x27;;
            } else {
                numBox.style.background = &#x27;linear-gradient(135deg, #4facfe, #00f2fe)&#x27;;
            }

            // Mulai timer countdown 60 detik
            startTimer();
        }

        function answerQuestion(isCorrect) {
            // Tandai angka sudah digunakan beserta hasilnya
            usedNumbers.set(currentNumber, isCorrect ? &#x27;correct&#x27; : &#x27;wrong&#x27;);

            // Hentikan timer
            stopTimer();

            // Mainkan suara langsung tanpa delay menggunakan cloneNode
            // Logic Jawaban &amp; Suara
            if (isCorrect) {
                const snd = soundCorrect.cloneNode();
                snd.volume = 0.6;
                snd.play().catch(e =&gt; { });
                showResultModal(true, &#x27;✓ BENAR!&#x27;, &#x27;Selamat! Jawaban Anda benar.&#x27;);
            } else {
                const snd = soundWrong.cloneNode();
                snd.volume = 0.8;
                snd.play().catch(e =&gt; { });
                showResultModal(false, &#x27;✗ SALAH!&#x27;, &#x27;Maaf, jawaban Anda salah. Coba lagi di soal berikutnya!&#x27;);
            }

            // Simpan progress
            saveProgress();
        }

        function showResultModal(isCorrect, title, text) {
            const modal = document.getElementById(&#x27;resultModal&#x27;);
            const modalContent = document.getElementById(&#x27;modalContent&#x27;);
            const modalIcon = document.getElementById(&#x27;modalIcon&#x27;);
            const modalTitle = document.getElementById(&#x27;modalTitle&#x27;);
            const modalText = document.getElementById(&#x27;modalText&#x27;);

            if (isCorrect) {
                modalContent.className = &#x27;modal-content correct&#x27;;
                modalIcon.textContent = &#x27;✓&#x27;;
            } else {
                modalContent.className = &#x27;modal-content wrong&#x27;;
                modalIcon.textContent = &#x27;✗&#x27;;
            }

            modalTitle.textContent = title;
            modalText.textContent = text;
            modal.classList.add(&#x27;show&#x27;);
        }

        function closeModal() {
            document.getElementById(&#x27;resultModal&#x27;).classList.remove(&#x27;show&#x27;);
            backToMain();
        }

        function backToMain() {
            stopTimer();
            const mainPage = document.getElementById(&#x27;mainPage&#x27;);
            mainPage.style.display = &#x27;block&#x27;;
            mainPage.style.animation = &#x27;none&#x27;; // hapus animasi saat kembali
            document.getElementById(&#x27;questionPage&#x27;).style.display = &#x27;none&#x27;;
            document.getElementById(&#x27;openBtn&#x27;).style.display = &#x27;none&#x27;;
            currentNumber = null;
            updateStatus();
            updateUsedNumbers();
        }

        function updateStatus() {
            document.getElementById(&#x27;answeredCount&#x27;).textContent = usedNumbers.size + &#x27;/6&#x27;;
            document.getElementById(&#x27;currentNumber&#x27;).textContent = currentNumber || &#x27;-&#x27;;
        }

        function updateUsedNumbers() {
            const container = document.getElementById(&#x27;usedNumbers&#x27;);
            const section = document.getElementById(&#x27;usedNumbersSection&#x27;);

            if (usedNumbers.size === 0) {
                section.style.visibility = &#x27;hidden&#x27;;
                return;
            }

            section.style.visibility = &#x27;visible&#x27;;
            container.innerHTML = &#x27;&#x27;;

            const sortedEntries = Array.from(usedNumbers.entries()).sort((a, b) =&gt; a[0] - b[0]);
            sortedEntries.forEach(([num, result]) =&gt; {
                const box = document.createElement(&#x27;div&#x27;);
                box.className = &#x27;used-number&#x27; + (num % 2 === 1 ? &#x27; red&#x27; : &#x27; blue&#x27;);
                box.setAttribute(&#x27;data-result&#x27;, result);
                box.textContent = num;
                container.appendChild(box);
            });
        }

        function saveProgress() {
            // Ubah key agar sesuai nama game baru
            localStorage.setItem(&#x27;colourDiceUsedNumbers&#x27;, JSON.stringify([...usedNumbers.entries()]));
        }

        function loadProgress() {
            const saved = localStorage.getItem(&#x27;colourDiceUsedNumbers&#x27;);
            if (saved) {
                usedNumbers = new Map(JSON.parse(saved));
                updateStatus();
                updateUsedNumbers();
                if (usedNumbers.size === 6) {
                    document.getElementById(&#x27;rollBtn&#x27;).disabled = true;
                }
            }
        }

        let isResetModalOpen = false;

        function showResetModal() {
            if (usedNumbers.size === 0) return; // tidak perlu reset jika kosong
            isResetModalOpen = true;
            document.getElementById(&#x27;resetModal&#x27;).classList.add(&#x27;show&#x27;);
        }

        function confirmReset(agree) {
            if (agree) {
                stopTimer();
                usedNumbers = new Map();
                currentNumber = null;
                availableNumbers = [1, 2, 3, 4, 5, 6];
                localStorage.removeItem(&#x27;colourDiceUsedNumbers&#x27;);
                updateStatus();
                updateUsedNumbers();
                document.getElementById(&#x27;mainDice&#x27;).textContent = &#x27;?&#x27;;
                document.getElementById(&#x27;rollBtn&#x27;).disabled = false;
                document.getElementById(&#x27;openBtn&#x27;).style.display = &#x27;none&#x27;;

                showResultModal(true, &#x27;Direset!&#x27;, &#x27;Game telah direset! Selamat bermain lagi!&#x27;);
            }
            isResetModalOpen = false;
            document.getElementById(&#x27;resetModal&#x27;).classList.remove(&#x27;show&#x27;);
        }

        // Keyboard shortcut: 1 = BENAR, 2 = SALAH, 3 = OK (Modal), R = RESET, Y = YA(RESET), ESC = BATAL(RESET)
        document.addEventListener(&#x27;keydown&#x27;, (e) =&gt; {
            if (isResetModalOpen) {
                if (e.key.toLowerCase() === &#x27;y&#x27;) {
                    confirmReset(true);
                } else if (e.key === &#x27;Escape&#x27;) {
                    confirmReset(false);
                }
                return;
            }

            if (e.key.toLowerCase() === &#x27;r&#x27;) {
                showResetModal();
                return;
            }

            const questionPage = document.getElementById(&#x27;questionPage&#x27;);
            if (questionPage.style.display === &#x27;none&#x27; || questionPage.style.display === &#x27;&#x27;) return;

            // Jangan aktif jika modal sedang terbuka, tapi jika tekan 3 maka klik OK (tutup modal)
            if (document.getElementById(&#x27;resultModal&#x27;).classList.contains(&#x27;show&#x27;)) {
                if (e.key === &#x27;3&#x27;) closeModal();
                return;
            }

            if (e.key === &#x27;1&#x27;) answerQuestion(true);
            else if (e.key === &#x27;2&#x27;) answerQuestion(false);
        });

        // Inisialisasi
        window.onload = () =&gt; {
            loadProgress();
            updateDiceDisplay(document.getElementById(&#x27;mainDice&#x27;), 1);
        };
    &lt;/script&gt;

    &lt;script&gt;
        window.addEventListener(&#x27;mousemove&#x27;, (e) =&gt; {
            window.parent.postMessage({
                type: &#x27;mousemove&#x27;, 
                x: e.clientX, 
                y: e.clientY
            }, &#x27;*&#x27;);
        });
        window.addEventListener(&#x27;keydown&#x27;, (e) =&gt; {
            if (e.key === &#x27;Tab&#x27;) {
                e.preventDefault();
                window.parent.postMessage({
                    type: &#x27;keydown&#x27;,
                    key: &#x27;Tab&#x27;
                }, &#x27;*&#x27;);
            }
        });
    &lt;/script&gt;

&lt;style&gt;

  .time-display {

&lt;/style&gt;

// TTS via Web Speech API
function getFemaleVoice() {
  const voices = window.speechSynthesis.getVoices();
  // Priority: Indonesian female, then Google female, then any female
  const idFemale = voices.find(v =&gt; v.lang.startsWith(&#x27;id&#x27;) &amp;&amp; /female|wanita|perempuan/i.test(v.name));
  if (idFemale) return idFemale;
  const googleId = voices.find(v =&gt; v.lang.startsWith(&#x27;id&#x27;) &amp;&amp; /google/i.test(v.name));
  if (googleId) return googleId;
  const anyId = voices.find(v =&gt; v.lang.startsWith(&#x27;id&#x27;));
  if (anyId) return anyId;
  // Fallback: any Google female
  const googleFemale = voices.find(v =&gt; /google/i.test(v.name) &amp;&amp; /female/i.test(v.name));
  if (googleFemale) return googleFemale;
  // Fallback: any female voice
  const anyFemale = voices.find(v =&gt; /female|zira|hazel|susan|samantha|karen|moira|fiona|tessa|victoria/i.test(v.name));
  return anyFemale || voices[0] || null;
}

function speak(text, onEnd) {
  if (!window.speechSynthesis) { if(onEnd) onEnd(); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = &#x27;id-ID&#x27;;
  u.rate = 0.95;
  u.pitch = 1.1;
  const voice = getFemaleVoice();
  if (voice) u.voice = voice;
  if(onEnd) u.onend = onEnd;
  // voices may not be loaded yet, retry once
  if (window.speechSynthesis.getVoices().length === 0) {
    window.speechSynthesis.onvoiceschanged = () =&gt; {
      const v2 = getFemaleVoice();
      if (v2) u.voice = v2;
      window.speechSynthesis.speak(u);
      window.speechSynthesis.onvoiceschanged = null;
    };
  } else {
    window.speechSynthesis.speak(u);
  }
}

// Alarm: repeating beep
let alarmInterval = null;
function playAlarm() {
  alarmAudio.currentTime = 0;
  alarmAudio.play();
}
function stopAlarm() {
  if(alarmInterval) { clearInterval(alarmInterval); alarmInterval = null; }
  countdownAudio.pause();
  countdownAudio.currentTime = 0;
}

// Triggered flags
const triggered = {};

function checkTriggers(rem) {
  const elapsed = TOTAL - rem;

  // T+0: start
  if (elapsed === 0 &amp;&amp; !triggered[&#x27;start&#x27;]) {
    triggered[&#x27;start&#x27;] = true;
    speak(&quot;Waktu Penugasan Telah Dimulai&quot;);
  }

  // At 25 min remaining (elapsed = 30min = 1800s)
  if (elapsed &gt;= 1800 &amp;&amp; !triggered[&#x27;25min&#x27;]) {
    triggered[&#x27;25min&#x27;] = true;
    speak(&quot;Waktu Penugasan Tersisa 25 Menit Lagi&quot;);
  }

  // At 50 min elapsed = 5 min work remaining
  if (elapsed &gt;= 3000 &amp;&amp; !triggered[&#x27;5min&#x27;]) {
    triggered[&#x27;5min&#x27;] = true;
    speak(&quot;Waktu Penugasan Tersisa 5 Menit Lagi&quot;);
  }

  // Work phase: 15 seconds left (rem = WORK_DURATION - 15 + ... wait)
  // 15 seconds before work ends = rem = 3300 - (3000-15) = 315? No.
  // Work ends at rem = 300 (5 min left = collection phase starts)
  // 15 sec before work ends = rem = 315
  if (rem === 315 &amp;&amp; !triggered[&#x27;work15&#x27;]) {
    triggered[&#x27;work15&#x27;] = true;
    countdownAudio.currentTime = 0;
    countdownAudio.play();
  }

  // Collection phase starts (rem = 300 = 5min)
  if (rem === 300 &amp;&amp; !triggered[&#x27;collect&#x27;]) {
    triggered[&#x27;collect&#x27;] = true;
    speak(&quot;Waktu Pengumpulan Telah Dimulai&quot;, () =&gt; {
      speak(&quot;Penugasan harap dikumpulkan di Google Classroom yang sudah disediakan dan sesuai dengan sesinya masing-masing&quot;);
    });
  }

  // Collection: 30 sec left
  if (rem === 30 &amp;&amp; !triggered[&#x27;col30&#x27;]) {
    triggered[&#x27;col30&#x27;] = true;
    speak(&quot;Waktu Pengumpulan tersisa 30 detik lagi&quot;);
  }

  // Collection: 15 sec left
  if (rem === 15 &amp;&amp; !triggered[&#x27;col15&#x27;]) {
    triggered[&#x27;col15&#x27;] = true;
    countdownAudio.currentTime = 0;
    countdownAudio.play();
  }

  // Done
  if (rem === 0 &amp;&amp; !triggered[&#x27;done&#x27;]) {
    triggered[&#x27;done&#x27;] = true;
    running = false;
    clearInterval(timer);
    // Stop any playing countdown audio
    countdownAudio.pause();
    countdownAudio.currentTime = 0;
    window.speechSynthesis &amp;&amp; window.speechSynthesis.cancel();
    playAlarm();
    document.getElementById(&#x27;doneOverlay&#x27;).classList.add(&#x27;show&#x27;);
    setNotification(&#x27;⏰&#x27;, &#x27;WAKTU PENUGASAN DAN PENGUMPULAN TELAH HABIS!&#x27;, &#x27;alert&#x27;);
  }
}

function formatTime(sec) {
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  return `${String(h).padStart(2,&#x27;0&#x27;)}:${String(m).padStart(2,&#x27;0&#x27;)}:${String(s).padStart(2,&#x27;0&#x27;)}`;
}

function formatMinSec(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${String(m).padStart(2,&#x27;0&#x27;)}:${String(s).padStart(2,&#x27;0&#x27;)}`;
}

function updateUI() {
  const rem = remaining;
  const elapsed = TOTAL - rem;
  
  // Time display (HH:MM:SS)
  document.getElementById(&#x27;timeDisplay&#x27;).textContent = formatTime(rem);

  // Progress
  const pct = (elapsed / TOTAL) * 100;
  const fill = document.getElementById(&#x27;progressFill&#x27;);
  fill.style.width = pct + &#x27;%&#x27;;

  const panel = document.getElementById(&#x27;clockPanel&#x27;);
  const label = document.getElementById(&#x27;phaseLabel&#x27;);
  const disp = document.getElementById(&#x27;timeDisplay&#x27;);

  if (rem === 0) {
    label.textContent = &#x27;WAKTU HABIS&#x27;;
    panel.className = &#x27;clock-panel phase-done&#x27;;
    fill.className = &#x27;progress-fill collect&#x27;;
    disp.className = &#x27;time-display danger&#x27;;
  } else if (rem &lt;= 300) {
    label.textContent = &#x27;📤 WAKTU PENGUMPULAN&#x27;;
    panel.className = &#x27;clock-panel phase-collect&#x27;;
    fill.className = &#x27;progress-fill collect&#x27;;
    document.getElementById(&#x27;segCollect&#x27;).classList.add(&#x27;active&#x27;);
    document.getElementById(&#x27;segWork&#x27;).classList.remove(&#x27;active&#x27;);
    if (rem &lt;= 30) disp.className = &#x27;time-display danger&#x27;;
    else if (rem &lt;= 60) disp.className = &#x27;time-display warning&#x27;;
    else disp.className = &#x27;time-display&#x27;;
  } else {
    label.textContent = &#x27;✏️ WAKTU PENUGASAN&#x27;;
    panel.className = &#x27;clock-panel&#x27;;
    fill.className = &#x27;progress-fill&#x27;;
    document.getElementById(&#x27;segWork&#x27;).classList.add(&#x27;active&#x27;);
    document.getElementById(&#x27;segCollect&#x27;).classList.remove(&#x27;active&#x27;);
    if (rem &lt;= 315) disp.className = &#x27;time-display warning&#x27;;
    else disp.className = &#x27;time-display&#x27;;
  }

  // Notification updates
  if (!triggered[&#x27;done&#x27;]) {
    if (rem &lt;= 300 &amp;&amp; rem &gt; 30) {
      setNotification(&#x27;📤&#x27;, &#x27;Waktu Pengumpulan sedang berjalan. Segera kumpulkan tugas di Google Classroom.&#x27;, &#x27;active&#x27;);
    } else if (rem &lt;= 30 &amp;&amp; rem &gt; 0) {
      setNotification(&#x27;🚨&#x27;, &#x27;Waktu Pengumpulan hampir habis! Segera kumpulkan tugas sekarang!&#x27;, &#x27;warn&#x27;);
    }
  }

  document.getElementById(&#x27;elapsedInfo&#x27;).textContent = formatMinSec(elapsed) + &#x27; berlalu&#x27;;
  document.getElementById(&#x27;remainInfo&#x27;).textContent = formatMinSec(rem) + &#x27; tersisa&#x27;;

  // Sync scrubber
  document.getElementById(&#x27;scrubber&#x27;).value = rem;
  document.getElementById(&#x27;scrubberVal&#x27;).textContent = formatMinSec(rem);
}

function setNotification(icon, text, cls) {
  const n = document.getElementById(&#x27;notification&#x27;);
  n.className = &#x27;notification &#x27; + (cls || &#x27;&#x27;);
  n.querySelector(&#x27;.notif-icon&#x27;).textContent = icon;
  n.querySelector(&#x27;.notif-text&#x27;).textContent = text;
}

function tick() {
  if (running) {
    let now = Date.now();
    let newRemaining = Math.max(0, Math.ceil((targetTime - now) / 1000));
    if (newRemaining !== remaining) {
      let startRem = remaining - 1;
      remaining = newRemaining;
      updateUI();
      for (let r = startRem; r &gt;= newRemaining; r--) {
        checkTriggers(r);
      }
      if (remaining &lt;= 0) {
         clearInterval(timer);
         running = false;
      }
    }
  }
}

function startTimer() {
  if (running) return;
  running = true;
  started = true;
  targetTime = Date.now() + remaining * 1000;
  
  document.getElementById(&#x27;btnStart&#x27;).style.display = &#x27;none&#x27;;
  document.getElementById(&#x27;btnPause&#x27;).style.display = &#x27;&#x27;;
  
  if (!triggered[&#x27;start&#x27;] &amp;&amp; remaining === TOTAL) {
    checkTriggers(TOTAL - 0); // elapsed=0 trick
  }

  timer = setInterval(tick, 1000);
  
  // Speak on first start
  if (!triggered[&#x27;start&#x27;]) {
    triggered[&#x27;start&#x27;] = true;
    speak(&quot;Waktu Penugasan Telah Dimulai&quot;);
  }
  
  setNotification(&#x27;▶️&#x27;, &#x27;Timer sedang berjalan. Selamat mengerjakan tugas!&#x27;, &#x27;active&#x27;);
}

function pauseTimer() {
  if (!running) return;
  running = false;
  clearInterval(timer);
  document.getElementById(&#x27;btnStart&#x27;).textContent = &#x27;▶ LANJUT&#x27;;
  document.getElementById(&#x27;btnStart&#x27;).style.display = &#x27;&#x27;;
  document.getElementById(&#x27;btnPause&#x27;).style.display = &#x27;none&#x27;;
  setNotification(&#x27;⏸&#x27;, &#x27;Timer dijeda.&#x27;, &#x27;&#x27;);
}

function resetTimer() {
  running = false;
  clearInterval(timer);
  stopAlarm();
  window.speechSynthesis &amp;&amp; window.speechSynthesis.cancel();
  remaining = TOTAL;
  Object.keys(triggered).forEach(k =&gt; delete triggered[k]);
  started = false;
  document.getElementById(&#x27;btnStart&#x27;).textContent = &#x27;▶ MULAI&#x27;;
  document.getElementById(&#x27;btnStart&#x27;).style.display = &#x27;&#x27;;
  document.getElementById(&#x27;btnPause&#x27;).style.display = &#x27;none&#x27;;
  document.getElementById(&#x27;doneOverlay&#x27;).classList.remove(&#x27;show&#x27;);
  setNotification(&#x27;🕐&#x27;, &#x27;Timer direset. Tekan MULAI untuk memulai kembali.&#x27;, &#x27;&#x27;);
  updateUI();
  document.getElementById(&#x27;phaseLabel&#x27;).textContent = &#x27;SIAP DIMULAI&#x27;;
  document.getElementById(&#x27;timeDisplay&#x27;).className = &#x27;time-display&#x27;;
  document.getElementById(&#x27;clockPanel&#x27;).className = &#x27;clock-panel&#x27;;
  document.getElementById(&#x27;progressFill&#x27;).style.width = &#x27;0%&#x27;;
  document.getElementById(&#x27;segWork&#x27;).classList.add(&#x27;active&#x27;);
  document.getElementById(&#x27;segCollect&#x27;).classList.remove(&#x27;active&#x27;);
}

function closeDone() {
  stopAlarm();
  document.getElementById(&#x27;doneOverlay&#x27;).classList.remove(&#x27;show&#x27;);
}

// Scrubber
const scrubber = document.getElementById(&#x27;scrubber&#x27;);
scrubber.addEventListener(&#x27;input&#x27;, function() {
  remaining = parseInt(this.value);
  targetTime = Date.now() + remaining * 1000;
  document.getElementById(&#x27;scrubberVal&#x27;).textContent = formatMinSec(remaining);
  // Clear triggers that are past this point so they re-fire
  const elapsed = TOTAL - remaining;
  if (elapsed &lt; 1800) delete triggered[&#x27;25min&#x27;];
  if (elapsed &lt; 3000) delete triggered[&#x27;5min&#x27;];
  if (remaining &gt; 315) delete triggered[&#x27;work15&#x27;];
  if (remaining &gt; 300) delete triggered[&#x27;collect&#x27;];
  if (remaining &gt; 30) delete triggered[&#x27;col30&#x27;];
  if (remaining &gt; 15) delete triggered[&#x27;col15&#x27;];
  if (remaining &gt; 0) delete triggered[&#x27;done&#x27;];
  updateUI();
});

updateUI();
document.getElementById(&#x27;phaseLabel&#x27;).textContent = &#x27;SIAP DIMULAI&#x27;;
document.getElementById(&#x27;progressFill&#x27;).style.width = &#x27;0%&#x27;;

            <iframe id="iframe-stamp" class="app-iframe" src="index.html" frameborder="0"></iframe>
        </div>
    </div>

    <script>
        let currentTabIndex = 0;
        const tabs = ['dice', 'stamp', 'timer'];

        function switchTab(tabId) {
            const targetIndex = tabs.indexOf(tabId);
            if (targetIndex === currentTabIndex) return;

            const isSlidingLeft = targetIndex > currentTabIndex; // Slide from right to left
            
            const prevTabId = tabs[currentTabIndex];
            const prevIframe = document.getElementById('iframe-' + prevTabId);
            const targetIframe = document.getElementById('iframe-' + tabId);

            // Update Buttons
            document.querySelectorAll('.tab').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.tab[data-index="${targetIndex}"]`).classList.add('active');

            // Setup Transition Classes
            prevIframe.classList.remove('active');
            targetIframe.classList.remove('active', 'slide-left-enter', 'slide-right-enter', 'slide-left-leave', 'slide-right-leave');
            
            if (isSlidingLeft) {
                targetIframe.classList.add('slide-left-enter');
                prevIframe.classList.add('slide-left-leave');
            } else {
                targetIframe.classList.add('slide-right-enter');
                prevIframe.classList.add('slide-right-leave');
            }

            // Force reflow
            void targetIframe.offsetWidth;

            // Animate
            targetIframe.classList.add('active');
            targetIframe.classList.remove('slide-left-enter', 'slide-right-enter');

            // Cleanup prev iframe after animation
            setTimeout(() => {
                prevIframe.classList.remove('slide-left-leave', 'slide-right-leave');
                prevIframe.style.display = 'none';
                
                // Reset styling affected by transition
                targetIframe.style.display = 'block';
            }, 500);

            targetIframe.contentWindow.focus();
            currentTabIndex = targetIndex;
        }

        function startApp() {
            const welcome = document.getElementById('welcome-screen');
            const appArea = document.getElementById('app-area');
            const firstIframe = document.getElementById('iframe-dice');
            
            // Initial slide up/fade out for welcome
            welcome.style.opacity = '0';
            welcome.style.transform = 'translateY(-20px)';
            
            // Prepare app area to slide from right
            appArea.style.display = 'flex';
            appArea.style.opacity = '0';
            appArea.style.transform = 'translateX(50px)';
            
            // Reflow
            void appArea.offsetWidth;
            
            appArea.style.transition = 'opacity 0.6s ease, transform 0.6s cubic-bezier(0.25, 0.8, 0.25, 1)';
            appArea.style.opacity = '1';
            appArea.style.transform = 'translateX(0)';

            setTimeout(() => {
                welcome.style.display = 'none';
                firstIframe.contentWindow.focus();
            }, 600);
        }

        function goHome() {
            const welcome = document.getElementById('welcome-screen');
            const appArea = document.getElementById('app-area');
            
            welcome.style.display = 'flex';
            
            requestAnimationFrame(() => {
                welcome.style.opacity = '1';
                welcome.style.transform = 'translateY(0)';
                
                appArea.style.opacity = '0';
                appArea.style.transform = 'translateX(50px)';
            });

            setTimeout(() => {
                appArea.style.display = 'none';
            }, 600);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault(); 
                toggleTabs();
            }
        });

        function toggleTabs() {
            let nextIndex = (currentTabIndex + 1) % tabs.length;
            switchTab(tabs[nextIndex]);
        }

        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        let particles = [];
        const numParticles = 120;
        
        function initParticles() {
            particles = [];
            for (let i = 0; i < numParticles; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 2 + 1.5,
                    vx: (Math.random() - 0.5) * 0.8,
                    vy: (Math.random() - 0.5) * 0.8,
                    color: `hsla(${Math.random() * 60 + 190}, 100%, 70%, 0.8)`
                });
            }
        }
        
        initParticles();
        
        const mouse = { x: -1000, y: -1000, radius: 150 };
        
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        });

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });
        
        window.addEventListener('mouseout', () => {
            mouse.x = -1000;
            mouse.y = -1000;
        });
        
        window.addEventListener("message", (event) => {
            if (event.data.type === "mousemove") {
                mouse.x = event.data.x;
                mouse.y = event.data.y + document.getElementById('tab-container').offsetHeight;
                
                if(document.getElementById('welcome-screen').style.display !== 'none') {
                    mouse.y = event.data.y;
                }
            } else if (event.data.type === "keydown" && event.data.key === "Tab") {
                toggleTabs();
            }
        });
        
        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                
                if (p.x < 0) p.x += canvas.width;
                if (p.x > canvas.width) p.x -= canvas.width;
                if (p.y < 0) p.y += canvas.height;
                if (p.y > canvas.height) p.y -= canvas.height;
                
                let dx = mouse.x - p.x;
                let dy = mouse.y - p.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < mouse.radius) {
                    let forceDirectionX = dx / distance;
                    let forceDirectionY = dy / distance;
                    let force = (mouse.radius - distance) / mouse.radius;
                    let directionX = forceDirectionX * force * 5;
                    let directionY = forceDirectionY * force * 5;
                    p.x -= directionX;
                    p.y -= directionY;
                }
                
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();
            }
            requestAnimationFrame(animateParticles);
        }
        
        animateParticles();
    </script>
