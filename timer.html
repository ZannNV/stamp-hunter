<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer Penugasan</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f8faff;
    --panel: #111827;
    --border: #1e3a5f;
    --accent: #00c2ff;
    --accent2: #ff6b35;
    --gold: #ffd700;
    --text: #e2e8f0;
    --muted: #64748b;
    --green: #10b981;
    --red: #ef4444;
    --warning: #f59e0b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background-image: 
      radial-gradient(ellipse at 20% 50%, rgba(0,194,255,0.07) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(255,107,53,0.05) 0%, transparent 50%);
  }
  .container {
    width: 100%;
    max-width: 700px;
  }
  .header {
    text-align: center;
    margin-bottom: 32px;
  }
  .header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 6vw, 3.5rem);
    letter-spacing: 4px;
    background: linear-gradient(135deg, var(--accent), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header p {
    color: var(--muted);
    font-size: 1rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* Phase indicator */
  .phase-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }
  .phase-segment {
    height: 6px;
    border-radius: 3px;
    transition: opacity 0.3s;
  }
  .phase-segment.work { flex: 10; background: var(--accent); opacity: 0.3; }
  .phase-segment.collect { flex: 1; background: var(--accent2); opacity: 0.3; }
  .phase-segment.active { opacity: 1; }

  /* Main clock display */
  .clock-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 32px;
    text-align: center;
    position: relative;
    overflow: hidden;
    margin-bottom: 24px;
    box-shadow: 0 0 40px rgba(0,194,255,0.05), inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .clock-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    transition: background 0.5s;
  }
  .clock-panel.phase-collect::before {
    background: linear-gradient(90deg, transparent, var(--accent2), transparent);
  }
  .clock-panel.phase-done::before {
    background: linear-gradient(90deg, transparent, var(--red), transparent);
  }

  .phase-label {
    font-size: 0.85rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
    transition: color 0.5s;
    font-weight: 600;
  }
  .phase-collect .phase-label { color: var(--accent2); }
  .phase-done .phase-label { color: var(--red); }

  .time-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(5rem, 18vw, 10rem);
    letter-spacing: 6px;
    line-height: 1;
    color: var(--text);
    transition: color 0.3s;
  }
  .time-display.warning { color: var(--warning); }
  .time-display.danger { color: var(--red); animation: pulse 0.5s infinite alternate; }
  @keyframes pulse {
    from { opacity: 1; }
    to { opacity: 0.6; }
  }

  .time-labels {
    display: flex;
    justify-content: center;
    gap: 0;
    margin-top: 4px;
  }
  .time-label-item {
    font-size: 0.7rem;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    width: 110px;
    text-align: center;
  }

  /* Progress bar */
  .progress-wrap {
    margin-top: 24px;
  }
  .progress-track {
    height: 8px;
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--accent), var(--gold));
    transition: width 0.5s linear, background 0.5s;
    width: 0%;
  }
  .progress-fill.collect { background: linear-gradient(90deg, var(--accent2), var(--red)); }
  .progress-info {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* Scrubber */
  .scrubber-wrap {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 24px;
  }
  .scrubber-label {
    font-size: 0.8rem;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
    font-weight: 600;
  }
  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 3px;
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid var(--bg);
    box-shadow: 0 0 8px rgba(0,194,255,0.5);
    cursor: grab;
    transition: transform 0.15s;
  }
  input[type=range]::-webkit-slider-thumb:active { cursor: grabbing; transform: scale(1.2); }
  .scrubber-times {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    font-size: 0.75rem;
    color: var(--muted);
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
  }
  .btn {
    flex: 1;
    padding: 16px;
    border: none;
    border-radius: 10px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-start {
    background: linear-gradient(135deg, var(--accent), #0088bb);
    color: #000;
    box-shadow: 0 4px 20px rgba(0,194,255,0.3);
  }
  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,194,255,0.4); }
  .btn-pause {
    background: rgba(255,255,255,0.07);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-pause:hover { background: rgba(255,255,255,0.12); }
  .btn-reset {
    background: rgba(239,68,68,0.1);
    color: var(--red);
    border: 1px solid rgba(239,68,68,0.3);
    flex: 0 0 auto;
    padding: 16px 24px;
  }
  .btn-reset:hover { background: rgba(239,68,68,0.2); }

  /* Notification */
  .notification {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    font-size: 0.95rem;
    line-height: 1.5;
    min-height: 60px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: border-color 0.3s, background 0.3s;
  }
  .notification.active {
    border-color: var(--accent);
    background: rgba(0,194,255,0.05);
  }
  .notification.warn {
    border-color: var(--warning);
    background: rgba(245,158,11,0.05);
  }
  .notification.alert {
    border-color: var(--red);
    background: rgba(239,68,68,0.08);
    animation: flashBorder 1s infinite;
  }
  @keyframes flashBorder {
    0%, 100% { border-color: var(--red); }
    50% { border-color: rgba(239,68,68,0.2); }
  }
  .notif-icon { font-size: 1.4rem; flex-shrink: 0; }
  .notif-text { flex: 1; }

  .done-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 24px;
  }
  .done-overlay.show { display: flex; animation: fadeIn 0.5s; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .done-box {
    background: var(--panel);
    border: 2px solid var(--red);
    border-radius: 20px;
    padding: 48px 64px;
    text-align: center;
    box-shadow: 0 0 60px rgba(239,68,68,0.3);
  }
  .done-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3.5rem;
    letter-spacing: 4px;
    color: var(--red);
    animation: pulse 0.5s infinite alternate;
  }
  .done-sub {
    color: var(--muted);
    margin-top: 8px;
    letter-spacing: 2px;
    font-size: 1rem;
  }
  .btn-close {
    margin-top: 24px;
    padding: 12px 32px;
    background: var(--red);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 2px;
    cursor: pointer;
  }

    /* Hide scrollbar, keep scrolling enabled */
    * { scrollbar-width: none; -ms-overflow-style: none; }
    *::-webkit-scrollbar { display: none; }
    html, body { overflow-y: auto; overflow-x: hidden; }
  
  /* ── DotGrid Background ── */
  #dg-bg {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
  }
  #dg-bg canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Ensure page content sits above DotGrid */
  body > *:not(#dg-bg) { position: relative; z-index: 1; }

  </style>
</head>
<body>
  <!-- DotGrid Background -->
  <div id="dg-bg"></div>


<div class="done-overlay" id="doneOverlay">
  <div class="done-box">
    <div class="done-title">⏰ WAKTU HABIS!</div>
    <div class="done-sub">WAKTU PENUGASAN DAN PENGUMPULAN TELAH SELESAI</div>
    <button class="btn-close" onclick="closeDone()">TUTUP</button>
  </div>
</div>

<div class="container">
  <div class="header">
    <h1>TIMER PENUGASAN</h1>
    <p>55 Menit Pengerjaan &nbsp;·&nbsp; 5 Menit Pengumpulan</p>
  </div>

  <div class="phase-bar">
    <div class="phase-segment work active" id="segWork"></div>
    <div class="phase-segment collect" id="segCollect"></div>
  </div>

  <div class="clock-panel" id="clockPanel">
    <div class="phase-label" id="phaseLabel">SIAP DIMULAI</div>
    <div class="time-display" id="timeDisplay">55:00</div>
    <div class="time-labels">
      <div class="time-label-item">JAM</div>
      <div class="time-label-item">MENIT</div>
      <div class="time-label-item">DETIK</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-info">
        <span id="elapsedInfo">Belum dimulai</span>
        <span id="remainInfo">55:00 tersisa</span>
      </div>
    </div>
  </div>

  <div class="scrubber-wrap">
    <div class="scrubber-label">⟵ Geser untuk maju / mundur waktu ⟶</div>
    <input type="range" id="scrubber" min="0" max="3600" value="3600" step="1">
    <div class="scrubber-times">
      <span>55:00</span>
      <span id="scrubberVal">55:00</span>
      <span>00:00</span>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-start" id="btnStart" onclick="startTimer()">▶ MULAI</button>
    <button class="btn btn-pause" id="btnPause" onclick="pauseTimer()" style="display:none">⏸ JEDA</button>
    <button class="btn btn-reset" onclick="resetTimer()">↺</button>
  </div>

  <div class="notification" id="notification">
    <span class="notif-icon">🕐</span>
    <span class="notif-text">Tekan MULAI untuk memulai timer penugasan.</span>
  </div>
</div>

alarmAudio.preload = "auto";

// TTS via Web Speech API
function getFemaleVoice() {
  const voices = window.speechSynthesis.getVoices();
  // Priority: Indonesian female, then Google female, then any female
  const idFemale = voices.find(v => v.lang.startsWith('id') && /female|wanita|perempuan/i.test(v.name));
  if (idFemale) return idFemale;
  const googleId = voices.find(v => v.lang.startsWith('id') && /google/i.test(v.name));
  if (googleId) return googleId;
  const anyId = voices.find(v => v.lang.startsWith('id'));
  if (anyId) return anyId;
  // Fallback: any Google female
  const googleFemale = voices.find(v => /google/i.test(v.name) && /female/i.test(v.name));
  if (googleFemale) return googleFemale;
  // Fallback: any female voice
  const anyFemale = voices.find(v => /female|zira|hazel|susan|samantha|karen|moira|fiona|tessa|victoria/i.test(v.name));
  return anyFemale || voices[0] || null;
}

function speak(text, onEnd) {
  if (!window.speechSynthesis) { if(onEnd) onEnd(); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'id-ID';
  u.rate = 0.95;
  u.pitch = 1.1;
  const voice = getFemaleVoice();
  if (voice) u.voice = voice;
  if(onEnd) u.onend = onEnd;
  // voices may not be loaded yet, retry once
  if (window.speechSynthesis.getVoices().length === 0) {
    window.speechSynthesis.onvoiceschanged = () => {
      const v2 = getFemaleVoice();
      if (v2) u.voice = v2;
      window.speechSynthesis.speak(u);
      window.speechSynthesis.onvoiceschanged = null;
    };
  } else {
    window.speechSynthesis.speak(u);
  }
}

// Alarm: repeating beep
let alarmInterval = null;
function playAlarm() {
  alarmAudio.currentTime = 0;
  alarmAudio.play();
}
function stopAlarm() {
  if(alarmInterval) { clearInterval(alarmInterval); alarmInterval = null; }
  countdownAudio.pause();
  countdownAudio.currentTime = 0;
}

// Triggered flags
const triggered = {};

function checkTriggers(rem) {
  const elapsed = TOTAL - rem;

  // T+0: start
  if (elapsed === 0 && !triggered['start']) {
    triggered['start'] = true;
    speak("Waktu Penugasan Telah Dimulai");
  }

  // At 25 min remaining (elapsed = 30min = 1800s)
  if (elapsed >= 1800 && !triggered['25min']) {
    triggered['25min'] = true;
    speak("Waktu Penugasan Tersisa 25 Menit Lagi");
  }

  // At 50 min elapsed = 5 min work remaining
  if (elapsed >= 3000 && !triggered['5min']) {
    triggered['5min'] = true;
    speak("Waktu Penugasan Tersisa 5 Menit Lagi");
  }

  // Work phase: 15 seconds left (rem = WORK_DURATION - 15 + ... wait)
  // 15 seconds before work ends = rem = 3300 - (3000-15) = 315? No.
  // Work ends at rem = 300 (5 min left = collection phase starts)
  // 15 sec before work ends = rem = 315
  if (rem === 315 && !triggered['work15']) {
    triggered['work15'] = true;
    countdownAudio.currentTime = 0;
    countdownAudio.play();
  }

  // Collection phase starts (rem = 300 = 5min)
  if (rem === 300 && !triggered['collect']) {
    triggered['collect'] = true;
    speak("Waktu Pengumpulan Telah Dimulai", () => {
      speak("Penugasan harap dikumpulkan di Google Classroom yang sudah disediakan dan sesuai dengan sesinya masing-masing");
    });
  }

  // Collection: 30 sec left
  if (rem === 30 && !triggered['col30']) {
    triggered['col30'] = true;
    speak("Waktu Pengumpulan tersisa 30 detik lagi");
  }

  // Collection: 15 sec left
  if (rem === 15 && !triggered['col15']) {
    triggered['col15'] = true;
    countdownAudio.currentTime = 0;
    countdownAudio.play();
  }

  // Done
  if (rem === 0 && !triggered['done']) {
    triggered['done'] = true;
    running = false;
    clearInterval(timer);
    // Stop any playing countdown audio
    countdownAudio.pause();
    countdownAudio.currentTime = 0;
    window.speechSynthesis && window.speechSynthesis.cancel();
    playAlarm();
    document.getElementById('doneOverlay').classList.add('show');
    setNotification('⏰', 'WAKTU PENUGASAN DAN PENGUMPULAN TELAH HABIS!', 'alert');
  }
}

function formatTime(sec) {
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function formatMinSec(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function updateUI() {
  const rem = remaining;
  const elapsed = TOTAL - rem;
  
  // Time display (HH:MM:SS)
  document.getElementById('timeDisplay').textContent = formatTime(rem);

  // Progress
  const pct = (elapsed / TOTAL) * 100;
  const fill = document.getElementById('progressFill');
  fill.style.width = pct + '%';

  const panel = document.getElementById('clockPanel');
  const label = document.getElementById('phaseLabel');
  const disp = document.getElementById('timeDisplay');

  if (rem === 0) {
    label.textContent = 'WAKTU HABIS';
    panel.className = 'clock-panel phase-done';
    fill.className = 'progress-fill collect';
    disp.className = 'time-display danger';
  } else if (rem <= 300) {
    label.textContent = '📤 WAKTU PENGUMPULAN';
    panel.className = 'clock-panel phase-collect';
    fill.className = 'progress-fill collect';
    document.getElementById('segCollect').classList.add('active');
    document.getElementById('segWork').classList.remove('active');
    if (rem <= 30) disp.className = 'time-display danger';
    else if (rem <= 60) disp.className = 'time-display warning';
    else disp.className = 'time-display';
  } else {
    label.textContent = '✏️ WAKTU PENUGASAN';
    panel.className = 'clock-panel';
    fill.className = 'progress-fill';
    document.getElementById('segWork').classList.add('active');
    document.getElementById('segCollect').classList.remove('active');
    if (rem <= 315) disp.className = 'time-display warning';
    else disp.className = 'time-display';
  }

  // Notification updates
  if (!triggered['done']) {
    if (rem <= 300 && rem > 30) {
      setNotification('📤', 'Waktu Pengumpulan sedang berjalan. Segera kumpulkan tugas di Google Classroom.', 'active');
    } else if (rem <= 30 && rem > 0) {
      setNotification('🚨', 'Waktu Pengumpulan hampir habis! Segera kumpulkan tugas sekarang!', 'warn');
    }
  }

  document.getElementById('elapsedInfo').textContent = formatMinSec(elapsed) + ' berlalu';
  document.getElementById('remainInfo').textContent = formatMinSec(rem) + ' tersisa';

  // Sync scrubber
  document.getElementById('scrubber').value = rem;
  document.getElementById('scrubberVal').textContent = formatMinSec(rem);
}

function setNotification(icon, text, cls) {
  const n = document.getElementById('notification');
  n.className = 'notification ' + (cls || '');
  n.querySelector('.notif-icon').textContent = icon;
  n.querySelector('.notif-text').textContent = text;
}

function tick() {
  if (running) {
    let now = Date.now();
    let newRemaining = Math.max(0, Math.ceil((targetTime - now) / 1000));
    if (newRemaining !== remaining) {
      let startRem = remaining - 1;
      remaining = newRemaining;
      updateUI();
      for (let r = startRem; r >= newRemaining; r--) {
        checkTriggers(r);
      }
      if (remaining <= 0) {
         clearInterval(timer);
         running = false;
      }
    }
  }
}

function startTimer() {
  if (running) return;
  running = true;
  started = true;
  targetTime = Date.now() + remaining * 1000;
  
  document.getElementById('btnStart').style.display = 'none';
  document.getElementById('btnPause').style.display = '';
  
  if (!triggered['start'] && remaining === TOTAL) {
    checkTriggers(TOTAL - 0); // elapsed=0 trick
  }

  timer = setInterval(tick, 1000);
  
  // Speak on first start
  if (!triggered['start']) {
    triggered['start'] = true;
    speak("Waktu Penugasan Telah Dimulai");
  }
  
  setNotification('▶️', 'Timer sedang berjalan. Selamat mengerjakan tugas!', 'active');
}

function pauseTimer() {
  if (!running) return;
  running = false;
  clearInterval(timer);
  document.getElementById('btnStart').textContent = '▶ LANJUT';
  document.getElementById('btnStart').style.display = '';
  document.getElementById('btnPause').style.display = 'none';
  setNotification('⏸', 'Timer dijeda.', '');
}

function resetTimer() {
  running = false;
  clearInterval(timer);
  stopAlarm();
  window.speechSynthesis && window.speechSynthesis.cancel();
  remaining = TOTAL;
  Object.keys(triggered).forEach(k => delete triggered[k]);
  started = false;
  document.getElementById('btnStart').textContent = '▶ MULAI';
  document.getElementById('btnStart').style.display = '';
  document.getElementById('btnPause').style.display = 'none';
  document.getElementById('doneOverlay').classList.remove('show');
  setNotification('🕐', 'Timer direset. Tekan MULAI untuk memulai kembali.', '');
  updateUI();
  document.getElementById('phaseLabel').textContent = 'SIAP DIMULAI';
  document.getElementById('timeDisplay').className = 'time-display';
  document.getElementById('clockPanel').className = 'clock-panel';
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('segWork').classList.add('active');
  document.getElementById('segCollect').classList.remove('active');
}

function closeDone() {
  stopAlarm();
  document.getElementById('doneOverlay').classList.remove('show');
}

// Scrubber
const scrubber = document.getElementById('scrubber');
scrubber.addEventListener('input', function() {
  remaining = parseInt(this.value);
  targetTime = Date.now() + remaining * 1000;
  document.getElementById('scrubberVal').textContent = formatMinSec(remaining);
  // Clear triggers that are past this point so they re-fire
  const elapsed = TOTAL - remaining;
  if (elapsed < 1800) delete triggered['25min'];
  if (elapsed < 3000) delete triggered['5min'];
  if (remaining > 315) delete triggered['work15'];
  if (remaining > 300) delete triggered['collect'];
  if (remaining > 30) delete triggered['col30'];
  if (remaining > 15) delete triggered['col15'];
  if (remaining > 0) delete triggered['done'];
  updateUI();
});

updateUI();
document.getElementById('phaseLabel').textContent = 'SIAP DIMULAI';
document.getElementById('progressFill').style.width = '0%';

  <!-- GSAP for DotGrid -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
  // ====== DotGrid — Vanilla JS (ported from React Bits) ======
  (function initDotGrid() {
    const container = document.getElementById('dg-bg');
    if (!container) return;

    const CFG = {
      dotSize      : 7,
      gap          : 26,
      baseColor    : '#dbeafe',
      activeColor  : '#2563eb',
      proximity    : 130,
      speedTrigger : 90,
      shockRadius  : 210,
      shockStrength: 4,
      maxSpeed     : 5000,
      resistance   : 750,
      returnDuration: 1.5
    };

    function hexToRgb(hex) {
      const m = hex.match(/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i);
      return m ? { r:parseInt(m[1],16), g:parseInt(m[2],16), b:parseInt(m[3],16) } : {r:0,g:0,b:0};
    }
    const baseRgb   = hexToRgb(CFG.baseColor);
    const activeRgb = hexToRgb(CFG.activeColor);

    const canvas = document.createElement('canvas');
    container.appendChild(canvas);
    const ctx = canvas.getContext('2d');

    let dots = [];
    const pr = { x: -9999, y: -9999, vx:0, vy:0, speed:0, lastTime:0, lastX:0, lastY:0 };

    const circlePath = new Path2D();
    circlePath.arc(0, 0, CFG.dotSize / 2, 0, Math.PI * 2);

    function buildGrid() {
      const w = window.innerWidth, h = window.innerHeight;
      const dpr = window.devicePixelRatio || 1;
      canvas.width  = w * dpr;
      canvas.height = h * dpr;
      canvas.style.width  = w + 'px';
      canvas.style.height = h + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const cell = CFG.dotSize + CFG.gap;
      const cols = Math.floor((w + CFG.gap) / cell);
      const rows = Math.floor((h + CFG.gap) / cell);
      const startX = ((w - (cell*cols - CFG.gap)) / 2) + CFG.dotSize / 2;
      const startY = ((h - (cell*rows - CFG.gap)) / 2) + CFG.dotSize / 2;

      if (typeof gsap !== 'undefined') dots.forEach(d => gsap.killTweensOf(d));
      dots = [];
      for (let r = 0; r < rows; r++)
        for (let c = 0; c < cols; c++)
          dots.push({ cx: startX + c*cell, cy: startY + r*cell, xOffset:0, yOffset:0, _applied:false });
    }

    const proxSq = CFG.proximity * CFG.proximity;
    function draw() {
      const w = canvas.width / (window.devicePixelRatio||1);
      const h = canvas.height / (window.devicePixelRatio||1);
      ctx.clearRect(0, 0, w, h);
      for (const dot of dots) {
        const ox = dot.cx + dot.xOffset, oy = dot.cy + dot.yOffset;
        const dx = dot.cx - pr.x, dy = dot.cy - pr.y;
        const dsq = dx*dx + dy*dy;
        let fillStyle = CFG.baseColor;
        if (dsq <= proxSq) {
          const t = 1 - Math.sqrt(dsq) / CFG.proximity;
          fillStyle = `rgb(${Math.round(baseRgb.r+(activeRgb.r-baseRgb.r)*t)},${Math.round(baseRgb.g+(activeRgb.g-baseRgb.g)*t)},${Math.round(baseRgb.b+(activeRgb.b-baseRgb.b)*t)})`;
        }
        ctx.save(); ctx.translate(ox, oy); ctx.fillStyle = fillStyle; ctx.fill(circlePath); ctx.restore();
      }
      requestAnimationFrame(draw);
    }

    function throttle(fn, ms) {
      let last = 0;
      return function(...args) { const now = performance.now(); if (now - last >= ms) { last=now; fn.apply(this,args); } };
    }

    const onMove = throttle(e => {
      const now = performance.now();
      const dt = pr.lastTime ? now - pr.lastTime : 16;
      const dx = e.clientX - pr.lastX, dy = e.clientY - pr.lastY;
      let vx = (dx/dt)*1000, vy = (dy/dt)*1000;
      let speed = Math.hypot(vx, vy);
      if (speed > CFG.maxSpeed) { const s=CFG.maxSpeed/speed; vx*=s; vy*=s; speed=CFG.maxSpeed; }
      pr.lastTime=now; pr.lastX=e.clientX; pr.lastY=e.clientY;
      pr.vx=vx; pr.vy=vy; pr.speed=speed;
      pr.x=e.clientX; pr.y=e.clientY;
      if (typeof gsap === 'undefined') return;
      for (const dot of dots) {
        const dist = Math.hypot(dot.cx - pr.x, dot.cy - pr.y);
        if (speed > CFG.speedTrigger && dist < CFG.proximity && !dot._applied) {
          dot._applied = true;
          gsap.killTweensOf(dot);
          gsap.to(dot, {
            xOffset: (dot.cx - pr.x)*0.4 + vx*0.03,
            yOffset: (dot.cy - pr.y)*0.4 + vy*0.03,
            duration: 0.25, ease: 'power2.out',
            onComplete() {
              gsap.to(dot, { xOffset:0, yOffset:0, duration: CFG.returnDuration, ease:'elastic.out(1,0.75)' });
              dot._applied = false;
            }
          });
        }
      }
    }, 50);

    const onClick = e => {
      if (typeof gsap === 'undefined') return;
      for (const dot of dots) {
        const dist = Math.hypot(dot.cx - e.clientX, dot.cy - e.clientY);
        if (dist < CFG.shockRadius && !dot._applied) {
          dot._applied = true;
          gsap.killTweensOf(dot);
          const falloff = Math.max(0, 1 - dist/CFG.shockRadius);
          gsap.to(dot, {
            xOffset: (dot.cx - e.clientX)*CFG.shockStrength*falloff,
            yOffset: (dot.cy - e.clientY)*CFG.shockStrength*falloff,
            duration: 0.2, ease: 'power3.out',
            onComplete() {
              gsap.to(dot, { xOffset:0, yOffset:0, duration: CFG.returnDuration, ease:'elastic.out(1,0.75)' });
              dot._applied = false;
            }
          });
        }
      }
    };

    window.addEventListener('mousemove', onMove, { passive:true });
    window.addEventListener('click', onClick);
    window.addEventListener('resize', buildGrid);
    buildGrid();
    draw();
  })();
  </script>
